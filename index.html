<!DOCTYPE html>
<html>
<head>
  <title>Telescope Guide</title>

  <style>
    body {
      background-color: #0b0f1a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    h2 {
      color: #aaa;
      margin-bottom: 40px;
    }

    .card {
      background-color: #111827;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      max-width: 500px;
    }
  </style>

</head>

<body>

  <h1>What can I see in the telescope?</h1>
  <h2>SkyWatcher 130/650 PDS</h2>

  <div class="card">
    <h3>Jupiter</h3>
    <p>Small bright disk with cloud bands. 2–4 moons visible.</p>
  </div>
  <img src="jupiter.jpg" width="200">
  <p>10mm lens</p>
  <div style="margin-top: 100px;"></div>
 
  <div class="card">
    <h3>Moon</h3>
    <p>Very detailed surface, craters clearly visible.</p>
  </div>
  <img src="moon.jpg" width="200">
  <p>10mm lens</p>
  <div style="margin-top: 100px;">
  
  <div class="card">
    <h3>Orion Nebula</h3>
    <p>Faint gray cloud. Not colorful like photos.</p>
  </div>
   <img src="orion nebula.jpg" width="400">
   <p>10mm lens</p>

</body>
</html>
